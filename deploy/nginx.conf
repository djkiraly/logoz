# Nginx configuration for Logoz Cloud Print Studio
# Usage:
#   1. Replace "yourdomain.com" with your actual domain
#   2. Run: sudo cp deploy/nginx.conf /etc/nginx/sites-available/logoz
#   3. Run: sudo ln -sf /etc/nginx/sites-available/logoz /etc/nginx/sites-enabled/
#   4. Run: sudo nginx -t && sudo systemctl reload nginx
#   5. Run: sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# Upstream (PM2 cluster).
# The port must match the app's PORT (.env). deploy.sh rewrites this line on
# every deploy to keep it in sync, so on a multi-site host set PORT in .env and
# let the deploy script update the value here.
upstream logoz_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

# Redirect HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://yourdomain.com$request_uri;
    }
}

# Redirect www -> non-www
server {
    # HTTP/2 via the `listen ... http2` form for compatibility with nginx < 1.25
    # (the newer `http2 on;` directive errors on older nginx). Newer nginx still
    # accepts this with only a deprecation warning.
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.yourdomain.com;

    # SSL certs managed by certbot (placeholder until certbot runs)
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    return 301 https://yourdomain.com$request_uri;
}

# Main HTTPS server
server {
    # http2 is enabled once on the www block's listen above; repeating it here
    # would trigger a "protocol options redefined" warning, so keep plain. The
    # option applies to the shared 443 socket regardless.
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name yourdomain.com;

    # SSL configuration (certbot will manage certs)
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hide nginx version
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Client body size (file uploads)
    client_max_body_size 25M;

    # Rate limit login endpoint
    location /api/admin/auth/login {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://logoz_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # SanMar catalog upload — large files (hundreds of MB).
    # Longest-prefix match, so this wins over the generic /api/ block below.
    # No body-size cap, and stream the request straight to the app instead of
    # buffering the whole upload to a temp file first. Generous timeouts for slow
    # uploads. Not rate-limited (admin-only, infrequent, large).
    location /api/admin/sanmar/catalog {
        client_max_body_size 0;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_pass http://logoz_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Rate limit API endpoints
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://logoz_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Next.js static assets (long cache)
    location /_next/static/ {
        proxy_pass http://logoz_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Public static files
    location /public/ {
        proxy_pass http://logoz_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # All other routes -> Next.js
    location / {
        proxy_pass http://logoz_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Logging
    access_log /var/log/nginx/logoz-access.log;
    error_log /var/log/nginx/logoz-error.log;
}
